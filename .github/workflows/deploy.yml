# Deploys on push to main:
#   1. The standalone API container (apps/api) on the VPS — the live backend.
#   2. The legacy PM2 web — kept as the rollback for the Cloudflare Worker
#      cutover (it no longer serves public traffic; the Worker route on
#      portfolio.josefelipedev.com intercepts first). Drop the PM2 step once the
#      Worker is trusted and the rollback is retired.
# The frontend (Worker) deploys from the web/pages-build branch (deploy-web.yml).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/myportfolio
            git pull origin main
            npm install --production=false
            npx prisma generate
            npx prisma db push
            npm run build
            pm2 restart portfolio --update-env
            # Rebuild + restart the standalone API container (Docker layer cache
            # keeps unchanged builds fast).
            docker compose -f apps/api/docker-compose.yml up -d --build
            echo "Deploy complete (PM2 web + API container)!"
