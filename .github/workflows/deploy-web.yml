name: Deploy Web (Cloudflare Worker)

# Builds the frontend with OpenNext and deploys it to the Cloudflare Worker
# (portfolio-web), which serves portfolio.josefelipedev.com via the route in
# wrangler.jsonc. The web reads the standalone API at NEXT_PUBLIC_API_BASE_URL
# (inlined at build time).
#
# Required repo secret: CLOUDFLARE_API_TOKEN — a token with
#   Account > Workers Scripts: Edit  and  Zone(josefelipedev.com) > Workers Routes: Edit
# (create at dash.cloudflare.com/profile/api-tokens).

on:
  push:
    branches: [web/pages-build]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Deploy Worker
    runs-on: ubuntu-latest
    # Prisma 7's prisma.config.ts requires DATABASE_URL to be resolvable just to
    # run `prisma generate` (postinstall) — it never connects here, the web is
    # API-only. A throwaway value satisfies the config loader on the runner.
    env:
      DATABASE_URL: postgresql://build:build@localhost:5432/build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (OpenNext) with the API base URL inlined
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api-portfolio.josefelipedev.com

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
